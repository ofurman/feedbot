
server {
    listen 80;
    listen [::]:80;
    server_name bbbitbot.me;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bbbitbot.me;
    error_log /var/log/nginx/bot.error.log error;
    ### START OF SSL CONFIGURATION ###
    #ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    #ssl_ecdh_curve secp384r1;
    #ssl_prefer_server_ciphers on;
    #ssl_session_cache shared:SSL:10m;
    #ssl_session_timeout 1d;
    #ssl_stapling on;
    #ssl_stapling_verify on;
    #ssl_certificate /etc/letsencrypt/live/$server_name/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/$server_name/privkey.pem;
    #ssl_trusted_certificate /etc/letsencrypt/live/$server_name/fullchain.pem;
    #ssl_dhparam /etc/letsencrypt/live/$server_name/dhparam.pem;

    include /config/nginx/proxy-confs/*.subfolder.conf;
    include /config/nginx/ssl.conf;
    ### END OF SSL CONFIGURATION ###
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload";
    location /bot {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://feedbot:5001;
    }
}
